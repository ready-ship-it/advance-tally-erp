{% extends "base.html" %}
{% block content %}
<div class="row-between">
    <h1>Edit HSN Code: {{ hsn.hsn_code }}</h1>
    <a href="{{ url_for('hsn.hsn_master') }}" class="btn">Back to Master</a>
</div>

<div class="card">
    <form action="{{ url_for('hsn.edit_hsn', hsn_code=hsn.hsn_code) }}" method="POST" class="form-grid">
        <label>HSN Code
            <input type="text" value="{{ hsn.hsn_code }}" disabled>
        </label>
        <label>Category
            <input type="text" name="category" value="{{ hsn.category }}" list="catList" required>
            <datalist id="catList">
                {% for cat in categories %}<option value="{{ cat }}">{% endfor %}
            </datalist>
        </label>
        <label class="full">Description
            <textarea name="description" required>{{ hsn.description }}</textarea>
        </label>
        <label>Chapter
            <input type="text" name="chapter" value="{{ hsn.chapter }}" required>
        </label>
        <label>GST Rate (%)
            <input type="number" step="0.01" name="gst_rate" value="{{ hsn.gst_rate }}" required>
        </label>
        <label>Cess Rate (%)
            <input type="number" step="0.01" name="cess_rate" value="{{ hsn.cess_rate }}">
        </label>
        <label>Active
            <select name="is_active">
                <option value="1" {% if hsn.is_active %}selected{% endif %}>Yes</option>
                <option value="0" {% if not hsn.is_active %}selected{% endif %}>No</option>
            </select>
        </label>
        <div class="full mt">
            <button type="submit" class="btn primary">Update HSN Code</button>
        </div>
    </form>
</div>
{% endblock %}
