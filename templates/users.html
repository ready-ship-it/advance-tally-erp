{% extends "base.html" %}
{% block content %}
<h1>Users &amp; Roles</h1>
<table class="data"><thead><tr><th>Username</th><th>Name</th><th>Role</th><th>Active</th><th>Update</th></tr></thead><tbody>
{% for u in users %}
<tr>
  <td>{{ u.username }}</td><td>{{ u.full_name }}</td>
  <td>
    <form method="post" action="{{ url_for('admin.update_user', uid=u.id) }}" class="inline-form">
      <select name="role">{% for r in roles %}<option value="{{r}}" {% if u.role==r %}selected{% endif %}>{{r}}</option>{% endfor %}</select>
  </td>
  <td><input type="checkbox" name="is_active_flag" {% if u.is_active_flag %}checked{% endif %}></td>
  <td>
    <input name="full_name" placeholder="Full name" value="{{ u.full_name or '' }}">
    <input name="password" placeholder="New password (optional)" type="password">
    <button class="btn">Save</button>
    </form>
  </td>
</tr>
{% endfor %}
</tbody></table>

<h2>Add new user</h2>
<form method="post" action="{{ url_for('admin.new_user') }}" class="form-grid">
  <label>Username<input name="username" required></label>
  <label>Full name<input name="full_name"></label>
  <label>Email<input name="email" type="email"></label>
  <label>Password<input name="password" type="password" required></label>
  <label>Role
    <select name="role">{% for r in roles %}<option value="{{r}}">{{r}}</option>{% endfor %}</select>
  </label>
  <div class="full"><button class="btn primary">Create user</button></div>
</form>
{% endblock %}
