{% extends "base.html" %}
{% block content %}
<h1>New {{ vtype.title() }} Voucher</h1>
<form method="post" class="form-grid">
  <label>Date<input type="date" name="voucher_date" value="{{ today }}" required></label>
  <label>Party
    <select name="party_id">
      <option value="">— None —</option>
      {% for p in parties %}<option value="{{p.id}}">{{p.name}}</option>{% endfor %}
    </select>
  </label>
  <label>Mode
    <select name="payment_mode"><option value="cash">Cash</option><option value="bank">Bank</option></select>
  </label>
  <label>Amount ₹<input name="amount" type="number" step="0.01" required></label>
  <label class="full">Narration<textarea name="narration"></textarea></label>
  <div class="full"><button class="btn primary">Save</button>
    <a href="{{ url_for('vouchers.list_vouchers', vtype=vtype) }}" class="btn">Cancel</a></div>
</form>
{% endblock %}
