{% extends "base.html" %}
{% block content %}
<h1>New {{ vtype.title() }} Voucher</h1>
<form method="post" class="form-grid">
  <label>Date<input type="date" name="voucher_date" value="{{ today }}" required></label>
  <label>Party
    <select name="party_id">
      <option value="">— None —</option>
      {% for p in parties %}<option value="{{p.id}}">{{p.name}}</option>{% endfor %}
    </select>
  </label>
  <label>Mode
    <select name="payment_mode" id="paymentMode">
      <option value="cash">Cash</option>
      <option value="bank">Bank</option>
      <option value="online">Online</option>
    </select>
  </label>
  <label id="transIdRow" style="display:none;">Transaction ID
    <input name="transaction_id" placeholder="UPI / Ref No.">
  </label>
  <label>Amount ₹<input name="amount" type="number" step="0.01" required></label>
  <label class="full">Narration<textarea name="narration"></textarea></label>
  <div class="full"><button class="btn primary">Save</button>
    <a href="{{ url_for('vouchers.list_vouchers', vtype=vtype) }}" class="btn">Cancel</a></div>
</form>
{% block scripts %}
<script>
document.getElementById('paymentMode').addEventListener('change', function() {
  const transRow = document.getElementById('transIdRow');
  transRow.style.display = (this.value === 'online') ? 'block' : 'none';
});
</script>
{% endblock %}
{% endblock %}
