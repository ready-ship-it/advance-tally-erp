{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>{{ "Edit" if category else "New" }} Category</h2>
    <form method="post" class="form">
        <div class="field">
            <label>Category Name</label>
            <input type="text" name="name" value="{{ category.name if category else '' }}" required>
        </div>
        
        <div class="field">
            <label>Default HSN Code</label>
            <input type="text" name="default_hsn" value="{{ category.default_hsn if category else '' }}" placeholder="e.g., 8471">
        </div>
        
        <div class="field">
            <label>Default GST Rate (%)</label>
            <input type="number" name="default_gst_rate" value="{{ category.default_gst_rate if category else 18 }}" step="0.01" min="0" max="100">
        </div>
        
        <div class="actions">
            <button type="submit" class="btn primary">Save Category</button>
            <a href="{{ url_for('inventory.categories') }}" class="btn secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
