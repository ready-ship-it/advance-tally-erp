{% extends "base.html" %}
{% block bodyclass %}auth{% endblock %}
{% block content %}
<div class="login-card">
  <h1>Tally-ERP Login</h1>
  <p class="muted">Sign in to access the workspace.</p>
  <form method="post">
    <label>Username</label>
    <input name="username" autofocus required>
    <label>Password</label>
    <input name="password" type="password" required>
    <button type="submit">Sign in</button>
  </form>
  <div class="muted small mt">
    Demo accounts (change after first login):<br>
    master / master@123 · admin / admin@123 · user / user@123
  </div>
</div>
{% endblock %}
