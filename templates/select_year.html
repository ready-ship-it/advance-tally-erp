{% extends "base.html" %}
{% block bodyclass %}auth{% endblock %}
{% block content %}
<div class="login-card">
  <h1>Select Financial Year</h1>
  <p class="muted">Choose the FY you want to work in (Indian FY: 1-Apr to 31-Mar).</p>
  <form method="post">
    <label>Financial Year</label>
    <select name="year" required>
      {% for y in years %}<option value="{{y}}" {% if y == current %}selected{% endif %}>FY {{y}}-{{ (y+1) % 100 }}</option>{% endfor %}
    </select>
    <button type="submit">Continue</button>
  </form>
</div>
{% endblock %}
